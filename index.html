<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taste Of Odisha - Advanced Analytics</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
<h1>Taste Of Odisha - Advanced Data Analytics</h1>
</header>

<div class="container">

<div class="card">
<h2>Upload CSV</h2>
<input type="file" id="fileInput" accept=".csv">
</div>

<div class="grid">
<div class="card">
<h2>Sales Trend</h2>
<canvas id="salesChart"></canvas>
</div>

<div class="card">
<h2>Dish Performance</h2>
<canvas id="dishChart"></canvas>
</div>

<div class="card">
<h2>Revenue Distribution</h2>
<canvas id="pieChart"></canvas>
</div>

<div class="card">
<h2>Insights & Conclusion</h2>
<p id="insights"></p>
</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
